# Auto-fix the mechanical rules (blank-line spacing, list indentation, emphasis
# style, ...) the same way ruff-format does for Python.
fix: true
config:
  # MD013 line-length: docs contain long lines / tables.
  MD013: false
  # MD033 no-inline-html: docs embed <p>/<code> HTML tags.
  MD033: false
  MD053: false
  # MD024 duplicate-heading: the RELEASE.md changelog repeats "### Improvements"
  # (sometimes as direct siblings) under every release section.
  MD024: false
  # MD025 single-h1: the changelog uses one "# Release ..." title per version, so
  # a single document legitimately has many top-level headings.
  MD025: false
  # MD001 heading-increment: the legacy changelog mixes #/##/### release headings.
  MD001: false
  # MD035 hr-style: the changelog separates releases with asterisk rules of
  # varying length (****************/*****************); do not enforce one style.
  MD035: false
  # MD040 fenced-code-language: README embeds plain directory-tree / output blocks.
  MD040: false
  # MD041 first-line-heading: README opens with the HTML branding/logo header.
  MD041: false
  # MD045 image-alt-text: the branding header uses <img> logos / social icons.
  MD045: false
globs:
  - "*.md"
ignores:
  - "node_modules/**"
  - "api/**"
  - "lib/**"
  - "dist/**"
  - "build/**"
  - "src/ondewo-nlu-api/**"
  - "ondewo-proto-compiler/**"
  - ".venv/**"
